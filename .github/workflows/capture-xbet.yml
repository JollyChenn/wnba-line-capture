name: capture-xbet
on:
  schedule:
    - cron: '*/15 * * * *'        # every 15 min so a run reliably lands ~30 min before each tip (captures always; pings only near tip)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: capture-xbet
  cancel-in-progress: false
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet curl_cffi pandas numpy
      - name: capture 1xbet via 1x-bet.com (datacenter-reachable)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python cloud_xbet.py
      - name: commit snapshots
        run: |
          git config user.name "xbet-cloud-bot"
          git config user.email "actions@users.noreply.github.com"
          git add xbet_snapshots.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no new lines this run"
          else
            git commit -m "xbet lines $(date -u +%FT%TZ)"
            git push
          fi

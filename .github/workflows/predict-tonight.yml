name: predict-tonight
on:
  schedule:
    - cron: '37 17 * * *'    # early line  (pre-slate, after daily-picks)
    - cron: '37 22 * * *'    # near-tip refresh (lineups/injuries firmer)
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: predict-tonight
  cancel-in-progress: false
jobs:
  predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: refresh history (resume-safe; only new finals)
        run: cd elo_model && python collect_history.py || true
      - name: predict tonight vs market
        run: cd elo_model && python predict_tonight.py || true
      - name: commit
        run: |
          git config user.name "elo-bot"; git config user.email "actions@users.noreply.github.com"
          for f in elo_model/elo_forward_log.csv elo_model/games_full.csv elo_model/box_full.csv elo_model/shots.csv elo_model/timeouts.csv; do [ -f "$f" ] && git add -f "$f" || true; done
          git diff --staged --quiet || { git commit -m "elo forward log $(date -u +%F)"; git pull --rebase --autostash origin main || true; git push || true; }

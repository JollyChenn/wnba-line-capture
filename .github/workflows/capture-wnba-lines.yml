name: capture-wnba-lines
on:
  # SCHEDULE DISABLED 2026-06-16 — Pinnacle sharp ref now comes from the FREE guest API
  # (guest.api.arcadia.pinnacle.com via cloud_xbet.pinnacle_lines -> bets_log pinn -> grade_bets sharp_clv).
  # This Odds-API path (the-odds-api.com -> line_snapshots.csv) was a redundant duplicate that burned the
  # shared 500-req/month quota. Guest API verified live (returns WNBA pts/reb/ast). Kept for manual runs only.
  # schedule:
  #   - cron: '5 * * * *'
  workflow_dispatch: {}         # manual "Run workflow" button only (no auto-schedule, no quota burn)
permissions:
  contents: write
concurrency:
  group: capture-wnba-lines
  cancel-in-progress: false
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture WNBA prop lines (quota-aware, Pinnacle/EU)
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          CAPTURE_MARKETS: player_points,player_points_rebounds_assists
          CAPTURE_REGIONS: eu
          CAPTURE_WINDOW_MIN: '540'   # 9h (was 3h): Pinnacle OPENS ~8h pre-tip, so 3h MISSED the open. 9h captures the OPENING line for sharp opening-CLV, through to the close. (Odds-API quota: ~3x more calls near a slate; cloud_capture is quota-aware + ODDS_API_KEYS rotates.)
          MAX_GAMES: '5'
        run: python cloud_capture.py
      - name: Commit any new snapshots
        run: |
          git config user.name "wnba-line-capture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add line_snapshots.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no new lines this run"
          else
            git commit -m "wnba lines $(date -u +%FT%TZ)"
            git push
          fi

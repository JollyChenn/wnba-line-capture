name: test-xbet-cloud
on:
  push:
    paths: ["cloud_xbet_test.py", ".github/workflows/test-xbet-cloud.yml"]
  workflow_dispatch: {}
jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --quiet requests curl_cffi
      - name: probe 1xbet mirrors from the cloud
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python cloud_xbet_test.py

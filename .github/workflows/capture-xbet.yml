name: capture-xbet
on:
  schedule:
    - cron: '0 */3 * * *'                            # every 3h baseline (early "line is good" ping)
    - cron: '0 16,17,18,19,20,21,22,23,0,1,2 * * *'  # hourly through the WNBA tip window (16:00-02:00 UTC) so a run lands near tip; dedup stops the spam
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: capture-xbet
  cancel-in-progress: false
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet curl_cffi pandas numpy
      - name: capture 1xbet via 1x-bet.com (datacenter-reachable)
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          XBET_WINDOW_MIN: '600'
        run: python cloud_xbet.py
      - name: commit snapshots
        run: |
          git config user.name "xbet-cloud-bot"
          git config user.email "actions@users.noreply.github.com"
          echo "snapshot file:"; ls -la xbet_snapshots.csv 2>&1 || echo "(none written this run)"
          git add -f xbet_snapshots.csv bets_log.csv 2>&1 || true
          git status --short
          if git diff --staged --quiet; then
            echo "nothing staged this run"
          else
            git commit -m "xbet lines $(date -u +%FT%TZ)"
            git pull --rebase --autostash origin main 2>&1 || true
            git push 2>&1 || echo "PUSH FAILED"
          fi

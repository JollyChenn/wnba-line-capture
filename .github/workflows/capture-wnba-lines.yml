name: capture-wnba-lines
on:
  schedule:
    - cron: '5 * * * *'        # hourly; most runs are FREE (no game near tip)
  workflow_dispatch: {}         # manual "Run workflow" button for testing
permissions:
  contents: write
concurrency:
  group: capture-wnba-lines
  cancel-in-progress: false
jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Capture WNBA prop lines (quota-aware, Pinnacle/EU)
        env:
          ODDS_API_KEYS: ${{ secrets.ODDS_API_KEYS }}
          CAPTURE_MARKETS: player_points,player_points_rebounds_assists
          CAPTURE_REGIONS: eu
          CAPTURE_WINDOW_MIN: '180'
          MAX_GAMES: '5'
        run: python cloud_capture.py
      - name: Commit any new snapshots
        run: |
          git config user.name "wnba-line-capture-bot"
          git config user.email "actions@users.noreply.github.com"
          git add line_snapshots.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "no new lines this run"
          else
            git commit -m "wnba lines $(date -u +%FT%TZ)"
            git push
          fi

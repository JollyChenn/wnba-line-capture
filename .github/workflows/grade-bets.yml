name: grade-bets
on:
  schedule:
    - cron: '23 5 * * *'      # 05:23 UTC — settle the OVERNIGHT slate right after games finish (WNBA tips 23:00-02:00 UTC, end ~05:00) — was waiting until 15:23
    - cron: '23 6 * * *'      # 06:23 UTC — backstop for late-ending games / ESPN box-score lag
    - cron: '23 15 * * *'     # 15:23 UTC — off top-of-hour (GitHub skips :00; that's why graded_bets went stale) — after daily-picks pulls last night's finals
    - cron: '23 18 * * *'     # 18:23 UTC backstop so a single skipped run can't leave the record un-graded
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: grade-bets
  cancel-in-progress: false
jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps + refresh box scores (last night's results)
        run: pip install --quiet pandas requests numpy && python daily_picks.py || true
      - name: Settle logged bets vs actual results
        run: python grade_bets.py
      - name: Update CLV history + ping the verdict to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python clv_reader.py || true
      - name: Rebuild HTML dashboard
        run: python build_dashboard.py || true
      - name: Commit track record
        run: |
          git config user.name "wnba-grade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add graded_bets.csv CLV_HISTORY.md dashboard.html data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "grade $(date -u +%F)"
            git pull --rebase --autostash origin main 2>&1 || true
            git push 2>&1 || echo "PUSH FAILED"
          fi

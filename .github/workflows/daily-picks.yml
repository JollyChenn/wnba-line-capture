name: daily-picks
on:
  schedule:
    - cron: '23 13 * * *'     # 13:23 UTC — OFF top-of-hour (GitHub skips :00 crons under load; this is what killed 6/18)
    - cron: '23 16 * * *'     # 16:23 UTC BACKSTOP (idempotent re-file) so a single skipped run can't wipe the day's slate
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: daily-picks
  cancel-in-progress: false
jobs:
  picks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas requests numpy curl_cffi
      - name: Generate core picks (any-2-of-3 unders + cascade lists)
        run: python daily_picks.py   # NO DISCORD_WEBHOOK -> no slate ping. The capture bot (cloud_xbet) does ALL pinging now: live-line bets (hit%/EV/team) + per-cycle heartbeat. (The old median/proj slate preview is disabled.)
      - name: Validate gathered data (freshness / range / dups / picks complete)
        run: python validate_data.py || echo "::warning::data validation flagged issues (see log above)"
      - name: Cross-check minutes/scoring vs CBS Sports (2nd source — informational)
        run: python cbs_check.py || echo "::warning::cbs_check could not run (CBS unreachable?)"
      - name: Rebuild HTML dashboard
        run: python build_dashboard.py || true
      - name: Commit picks + data cache
        run: |
          git config user.name "wnba-picks-bot"
          git config user.email "actions@users.noreply.github.com"
          git add PICKS.md picks_log.csv dashboard.html data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "nothing new"
          else
            git commit -m "picks $(date -u +%F)"
            git pull --rebase --autostash origin main 2>&1 || true
            git push 2>&1 || echo "PUSH FAILED"
          fi

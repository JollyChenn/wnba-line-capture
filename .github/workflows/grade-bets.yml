name: grade-bets
on:
  schedule:
    # MORNING SWEEP — overnight/West-coast games end ~04:00-05:00 UTC. GitHub free-tier DELAYS (~1.5-2h) and
    # often DROPS early-morning scheduled runs, so a single 05:23/06:23 cron silently no-fires and the slate sits
    # un-graded ~13h until the afternoon run. Fix: fire MANY cheap idempotent attempts across the morning — the
    # first one GitHub actually honors fetches last night's box + grades. Each run is ~30s and a no-op if nothing
    # new settled (the commit step skips when there's no diff), so over-firing costs nothing.
    - cron: '41 4 * * *'      # 04:41 UTC
    - cron: '41 5 * * *'      # 05:41 UTC
    - cron: '41 6 * * *'      # 06:41 UTC
    - cron: '41 7 * * *'      # 07:41 UTC
    - cron: '41 8 * * *'      # 08:41 UTC
    - cron: '41 9 * * *'      # 09:41 UTC — last morning catch-up before the afternoon backstops
    # AFTERNOON backstops — off top-of-hour (GitHub skips :00 hardest); after daily-picks pulls finals.
    - cron: '23 15 * * *'     # 15:23 UTC
    - cron: '23 18 * * *'     # 18:23 UTC
    # EVENING/OVERNIGHT — WNBA games tip 17:00-02:00 UTC and END ~19:30-04:30 UTC, so these settle each game
    # within ~1-2h of its finish instead of leaving it until the morning sweep (the ~9h lag we kept hitting).
    - cron: '41 20 * * *'     # 20:41 UTC
    - cron: '41 22 * * *'     # 22:41 UTC
    - cron: '41 0 * * *'      # 00:41 UTC
    - cron: '41 2 * * *'      # 02:41 UTC
  workflow_dispatch: {}
permissions:
  contents: write
concurrency:
  group: grade-bets
  cancel-in-progress: false
jobs:
  grade:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps + refresh box scores (last night's results)
        run: pip install --quiet pandas requests numpy && python daily_picks.py || true
      - name: Settle logged bets vs actual results
        run: python grade_bets.py
      - name: Update CLV history (no Discord ping — the dashboard shows results now)
        run: python clv_reader.py || true   # DISCORD_WEBHOOK intentionally NOT passed -> clv_reader stays silent (results live on the dashboard); actionable BET pings still fire from capture-xbet
      - name: Rebuild HTML dashboard
        run: python build_dashboard.py || true
      - name: Update signal filter report (forward CLV/overshoot tracker)
        run: python signal_report.py || true
      - name: Commit track record
        run: |
          git config user.name "wnba-grade-bot"
          git config user.email "actions@users.noreply.github.com"
          git add graded_bets.csv CLV_HISTORY.md dashboard.html FILTER_REPORT.md data/*.csv 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "nothing to commit"
          else
            git commit -m "grade $(date -u +%F)"
            git pull --rebase --autostash origin main 2>&1 || true
            git push 2>&1 || echo "PUSH FAILED"
          fi
